<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>东风汽车技能竞赛答题系统</title>
<style>
/* ============================================
   东风技能竞赛答题系统 — 工业美学设计
   配色：深蓝+橙红+金属质感
   ============================================ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg-dark: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2128;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #484f58;
  --accent: #ff6b35;
  --accent-dim: rgba(255,107,53,0.15);
  --accent-glow: rgba(255,107,53,0.4);
  --blue: #58a6ff;
  --blue-dim: rgba(88,166,255,0.12);
  --green: #3fb950;
  --green-dim: rgba(63,185,80,0.15);
  --red: #f85149;
  --red-dim: rgba(248,81,73,0.15);
  --yellow: #d29922;
  --yellow-dim: rgba(210,153,34,0.15);
  --purple: #bc8cff;
  --radius: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  background-image: 
    radial-gradient(ellipse at 20% 0%, rgba(255,107,53,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(88,166,255,0.05) 0%, transparent 50%);
  overflow-x: hidden;
}

/* ── Header ───────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-brand {
  display: flex; align-items: center; gap: 12px;
}
.header-logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #ff9a5c);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-title {
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.5px;
  background: linear-gradient(90deg, var(--text-primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-sub {
  font-size: 11px; color: var(--text-muted);
  letter-spacing: 1px;
}
.header-stats {
  display: flex; gap: 20px; align-items: center;
}
.header-stat {
  text-align: center;
  cursor: pointer;
  padding: 4px 12px;
  border-radius: 8px;
  transition: var(--transition);
}
.header-stat:hover { background: var(--bg-hover); }
.header-stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; font-weight: 600;
  color: var(--accent);
}
.header-stat-label {
  font-size: 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
}

/* ── Container ─────────────────────────────── */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* ── Screens ───────────────────────────────── */
.screen { display: none; }
.screen.active { display: block; }

/* ── Home Screen ───────────────────────────── */
.home-hero {
  text-align: center;
  padding: 48px 24px 40px;
  position: relative;
}
.home-hero::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
  pointer-events: none;
}
.home-badge {
  display: inline-block;
  padding: 4px 14px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  border-radius: 20px;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 1px;
  margin-bottom: 20px;
}
.home-title {
  font-size: 28px; font-weight: 900;
  margin-bottom: 8px;
  line-height: 1.3;
}
.home-title span {
  background: linear-gradient(90deg, var(--accent), #ff9a5c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.home-desc {
  font-size: 14px; color: var(--text-secondary);
  margin-bottom: 36px;
}

/* Stat cards on home */
.home-stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 32px;
}
.home-stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
  transition: var(--transition);
}
.home-stat-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.home-stat-card .icon {
  font-size: 24px; margin-bottom: 6px;
}
.home-stat-card .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700;
  color: var(--accent);
}
.home-stat-card .label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-top: 2px;
}

/* Mode cards */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.mode-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.mode-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), transparent);
  opacity: 0;
  transition: var(--transition);
}
.mode-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.mode-card:hover::before { opacity: 1; }
.mode-card.active-mode {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.mode-card .mode-icon {
  font-size: 28px; margin-bottom: 8px;
}
.mode-card .mode-title {
  font-size: 15px; font-weight: 700;
  margin-bottom: 4px;
}
.mode-card .mode-desc {
  font-size: 12px; color: var(--text-secondary);
  line-height: 1.5;
}
.mode-card .mode-count {
  position: absolute; top: 12px; right: 12px;
  background: var(--accent-dim);
  border: 1px solid var(--accent-glow);
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; padding: 2px 8px;
  border-radius: 10px;
}
.mode-card.full { grid-column: span 2; }

/* ── Quiz Screen ───────────────────────────── */
.quiz-topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.quiz-progress-info {
  display: flex; flex-direction: column; gap: 4px;
}
.quiz-progress-info .label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
}
.quiz-progress-info .nums {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 600;
}
.quiz-progress-info .nums .current { color: var(--accent); font-size: 20px; }
.quiz-progress-info .nums .total { color: var(--text-muted); }

.progress-bar-wrap {
  flex: 1; margin: 0 20px;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #ff9a5c);
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 8px var(--accent-glow);
}
.quiz-timer {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 600;
  color: var(--blue);
}
.quiz-timer.warning { color: var(--yellow); animation: pulse 1s infinite; }
.quiz-timer.danger { color: var(--red); animation: pulse 0.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.quiz-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
}
.quiz-type-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.quiz-type-badge.single { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
.quiz-type-badge.multi { background: rgba(188,140,255,0.12); color: var(--purple); border: 1px solid rgba(188,140,255,0.3); }
.quiz-type-badge.judge { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(210,153,34,0.3); }

.quiz-question-text {
  font-size: 16px; font-weight: 500;
  line-height: 1.7;
  margin-bottom: 20px;
  color: var(--text-primary);
}

.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 14px;
  background: var(--bg-dark);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}
.option-item:hover:not(.disabled) {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.option-item.selected:not(.multi-select-mode) {
  border-color: var(--accent);
  background: var(--accent-dim);
  box-shadow: 0 0 0 1px var(--accent);
}
.option-item.selected.multi-select-mode {
  border-color: var(--purple);
  background: rgba(188,140,255,0.1);
  box-shadow: 0 0 0 1px var(--purple);
}
.option-item.correct {
  border-color: var(--green);
  background: var(--green-dim);
  box-shadow: 0 0 0 1px var(--green);
}
.option-item.wrong {
  border-color: var(--red);
  background: var(--red-dim);
  box-shadow: 0 0 0 1px var(--red);
}
.option-key {
  width: 26px; height: 26px;
  border-radius: 6px;
  background: var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  transition: var(--transition);
  font-family: 'JetBrains Mono', monospace;
}
.option-item:hover:not(.disabled) .option-key { background: var(--accent-dim); color: var(--accent); }
.option-item.selected:not(.disabled) .option-key { background: var(--accent); color: #fff; }
.option-item.correct .option-key { background: var(--green); color: #fff; }
.option-item.wrong .option-key { background: var(--red); color: #fff; }
.option-text { font-size: 14px; line-height: 1.6; flex: 1; }
.option-check {
  font-size: 16px; flex-shrink: 0;
  opacity: 0; transition: var(--transition);
}
.option-item.selected .option-check { opacity: 1; }

/* Result banner */
.result-banner {
  padding: 16px 20px;
  border-radius: 10px;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
  font-size: 14px; font-weight: 500;
  animation: slideIn 0.3s ease;
}
.result-banner.correct { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
.result-banner.wrong { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
.result-banner.skipped { background: var(--yellow-dim); border: 1px solid var(--yellow); color: var(--yellow); }
.result-banner .icon { font-size: 20px; }
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:none; } }

.answer-explanation {
  background: var(--bg-dark);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  display: none;
}
.answer-explanation.show { display: block; animation: slideIn 0.3s ease; }
.answer-explanation strong { color: var(--green); }

/* Action buttons */
.quiz-actions {
  display: flex; gap: 10px;
  margin-top: 16px;
}
.btn {
  padding: 11px 20px;
  border-radius: 10px;
  border: none;
  font-size: 14px; font-weight: 600;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #ff9a5c);
  color: #fff;
  box-shadow: 0 4px 15px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-secondary {
  background: var(--bg-hover);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-green { background: var(--green); color: #fff; }
.btn-red { background: var(--red); color: #fff; }
.btn-block { width: 100%; justify-content: center; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
.btn .icon { font-size: 16px; }

/* ── Result Screen ─────────────────────────── */
.results-hero {
  text-align: center;
  padding: 48px 24px 32px;
}
.score-circle {
  width: 160px; height: 160px;
  border-radius: 50%;
  margin: 0 auto 24px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
  background: conic-gradient(var(--accent) 0%, var(--accent) var(--score-deg, 0%), var(--border) var(--score-deg, 0%));
  box-shadow: 0 0 40px var(--accent-glow);
}
.score-circle::before {
  content: '';
  position: absolute;
  inset: 10px;
  background: var(--bg-dark);
  border-radius: 50%;
}
.score-value {
  position: relative; z-index: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 36px; font-weight: 700;
  color: var(--accent);
}
.score-label {
  position: relative; z-index: 1;
  font-size: 12px; color: var(--text-muted);
  margin-top: 4px;
}
.results-grade {
  font-size: 24px; font-weight: 900;
  margin-bottom: 4px;
}
.results-grade span { 
  background: linear-gradient(90deg, var(--accent), #ff9a5c);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.results-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }

.results-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}
.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 8px;
  text-align: center;
}
.result-stat .icon { font-size: 20px; margin-bottom: 4px; }
.result-stat .val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 700;
}
.result-stat .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.result-stat.correct-stat .val { color: var(--green); }
.result-stat.wrong-stat .val { color: var(--red); }
.result-stat.skipped-stat .val { color: var(--yellow); }
.result-stat.time-stat .val { color: var(--blue); }

/* ── History Screen ─────────────────────────── */
.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.screen-title {
  font-size: 18px; font-weight: 700;
}
.history-filters {
  display: flex; gap: 8px; margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 12px; color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  font-family: 'Noto Sans SC', sans-serif;
}
.filter-chip.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: var(--transition);
}
.history-item:hover { border-color: var(--accent); }
.history-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.history-icon.single-mode { background: var(--blue-dim); color: var(--blue); }
.history-icon.multi-mode { background: rgba(188,140,255,0.12); color: var(--purple); }
.history-icon.mixed-mode { background: var(--accent-dim); color: var(--accent); }
.history-icon.judge-mode { background: var(--yellow-dim); color: var(--yellow); }

.history-info { flex: 1; }
.history-title {
  font-size: 14px; font-weight: 600;
  margin-bottom: 3px;
}
.history-meta {
  font-size: 11px; color: var(--text-muted);
  display: flex; gap: 12px; flex-wrap: wrap;
}
.history-score {
  text-align: right;
}
.history-score .pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; font-weight: 700;
  color: var(--accent);
}
.history-score .pts {
  font-size: 11px; color: var(--text-muted);
}

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
.empty-state p { font-size: 14px; }

/* ── Wrong Questions Screen ─────────────────── */
.wrong-tabs {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.tab-chip {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: var(--transition);
  font-family: 'Noto Sans SC', sans-serif;
}
.tab-chip.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.question-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.question-card .q-meta {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.question-card .q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-muted);
}
.question-card .q-text {
  font-size: 14px; line-height: 1.7;
  margin-bottom: 12px;
}
.question-card .your-answer {
  font-size: 12px; margin-top: 8px;
  padding: 6px 10px;
  background: var(--red-dim);
  border-radius: 6px;
  color: var(--red);
}
.question-card .correct-answer {
  font-size: 12px; margin-top: 4px;
  padding: 6px 10px;
  background: var(--green-dim);
  border-radius: 6px;
  color: var(--green);
}
.wrong-count-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  background: var(--red-dim);
  border: 1px solid var(--red);
  border-radius: 10px;
  font-size: 11px; color: var(--red);
}

/* ── Back button ─────────────────────────── */
.back-btn {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  padding: 4px 0;
  transition: var(--transition);
  background: none; border: none;
  font-family: 'Noto Sans SC', sans-serif;
}
.back-btn:hover { color: var(--accent); }

/* ── Scrollbar ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Toast ───────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 13px;
  z-index: 9999;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
  box-shadow: var(--shadow);
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* ── Mode select overlay ─────────────────── */
.mode-select-section {
  margin-top: 20px;
}
.mode-select-label {
  font-size: 12px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 10px;
}
.mode-chips {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.mode-chip {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg-card);
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer; transition: var(--transition);
  font-family: 'Noto Sans SC', sans-serif;
}
.mode-chip:hover { border-color: var(--accent); color: var(--accent); }
.mode-chip.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}
.mode-chip .chip-count {
  display: inline-block;
  margin-left: 6px;
  background: var(--border);
  border-radius: 8px;
  padding: 1px 6px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* Responsive */
@media (max-width: 480px) {
  .home-stats-grid { grid-template-columns: repeat(3, 1fr); }
  .mode-grid { grid-template-columns: 1fr; }
  .mode-card.full { grid-column: span 1; }
  .results-stats { grid-template-columns: repeat(2, 1fr); }
  .home-title { font-size: 22px; }
  .quiz-topbar { flex-wrap: wrap; gap: 8px; }
  .progress-bar-wrap { order: 3; width: 100%; margin: 4px 0 0; }
}
</style>
</head>
<body>

<!-- ══ Header ════════════════════════════════ -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">⚡</div>
    <div>
      <div class="header-title">东风技能竞赛</div>
      <div class="header-sub">题库答题系统</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="header-stat" onclick="navigate('history')">
      <div class="header-stat-num" id="totalSessions">0</div>
      <div class="header-stat-label">答题记录</div>
    </div>
    <div class="header-stat" onclick="navigate('wrong')">
      <div class="header-stat-num" id="totalWrong">0</div>
      <div class="header-stat-label">错题数</div>
    </div>
  </div>
</header>

<!-- ══ Main ═══════════════════════════════════ -->
<div class="container">

  <!-- Home Screen -->
  <div id="screen-home" class="screen active">
    <div class="home-hero">
      <div class="home-badge">⚡ 2026 职工技能竞赛</div>
      <h1 class="home-title">东风汽车集团<br><span>维修电工理论题库</span></h1>
      <p class="home-desc">精选 500 道维修电工题目，涵盖单选、多选、判断三大题型</p>
    </div>

    <div class="home-stats-grid">
      <div class="home-stat-card">
        <div class="icon">📝</div>
        <div class="val">500</div>
        <div class="label">总题量</div>
      </div>
      <div class="home-stat-card">
        <div class="icon">☑️</div>
        <div class="val" id="homeCorrect">—</div>
        <div class="label">正确率</div>
      </div>
      <div class="home-stat-card" onclick="navigate('wrong')" style="cursor:pointer;">
        <div class="icon">📚</div>
        <div class="val" id="homeWrong">0</div>
        <div class="label">错题集</div>
      </div>
      <div class="home-stat-card">
        <div class="icon">📝</div>
        <div class="val" id="homeSessions">0</div>
        <div class="label">已练习</div>
      </div>
    </div>

    <!-- Quick Start Buttons -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary btn-block" onclick="startQuickQuiz('all')">
        <span class="icon">🚀</span> 综合练习（500题随机）
      </button>
      <button class="btn btn-secondary btn-block" onclick="startSequentialQuiz()">
        <span class="icon">📖</span> 顺序练习（按题号顺序）
      </button>
      <div id="seqResumeBanner" style="display:none;margin-bottom:8px;">
        <button class="btn btn-block" onclick="resumeSequentialQuiz()" style="background:var(--green-dim);border:1px solid var(--green);color:var(--green);">
          <span class="icon">▶️</span> 继续上次顺序练习（第<span id="seqResumeNum">?</span>题）
        </button>
      </div>
      <button class="btn btn-secondary btn-block" onclick="showModeSelector()">
        <span class="icon">🎯</span> 专项答题
      </button>
    </div>

    <!-- Mode selector (hidden initially) -->
    <div id="modeSelector" class="mode-select-section" style="display:none; margin-top:16px;">
      <div class="mode-select-label">选择专项题目类型</div>
      <div class="mode-chips">
        <button class="mode-chip" onclick="toggleTypeChip(this, 'single')" data-type="single">
          单选题<span class="chip-count">300</span>
        </button>
        <button class="mode-chip" onclick="toggleTypeChip(this, 'multi')" data-type="multi">
          多选题<span class="chip-count">100</span>
        </button>
        <button class="mode-chip" onclick="toggleTypeChip(this, 'judge')" data-type="judge">
          判断题<span class="chip-count">100</span>
        </button>
      </div>
      <button class="btn btn-primary btn-block" style="margin-top:14px;" onclick="startCustomQuiz()" id="customQuizBtn" disabled>
        <span class="icon">▶️</span> 开始专项答题
      </button>
    </div>

    <!-- Recent History -->
    <div style="margin-top:24px;">
      <div class="screen-header">
        <div class="screen-title">📋 答题记录</div>
        <button class="back-btn" onclick="navigate('history')">查看全部 →</button>
      </div>
      <div id="recentHistory"></div>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-topbar">
      <div class="quiz-progress-info">
        <div class="label">题目进度</div>
        <div class="nums">
          <span class="current" id="curQNum">1</span>
          <span class="total">/<span id="totalQNum">20</span></span>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
      <div class="quiz-timer" id="quizTimer">
        ⏱ <span id="timerDisplay">00:00</span>
      </div>
    </div>

    <div class="quiz-card">
      <div class="quiz-type-badge" id="quizTypeBadge">
        <span id="quizTypeIcon">●</span>
        <span id="quizTypeText">单选题</span>
      </div>
      <div class="quiz-question-text" id="questionText"></div>
      <div class="options-list" id="optionsList"></div>
      <div class="result-banner" id="resultBanner" style="display:none;">
        <div class="icon" id="resultIcon"></div>
        <div>
          <div id="resultTitle"></div>
          <div id="resultAnswer" style="font-size:12px;margin-top:2px;"></div>
        </div>
      </div>
      <div class="answer-explanation" id="answerExplanation"></div>
    </div>

    <div class="quiz-actions">
      <button class="btn btn-ghost" onclick="exitQuiz()">← 退出</button>
      <button class="btn btn-secondary" id="skipBtn" onclick="skipQuestion()">⏭ 跳过</button>
      <button class="btn btn-primary" id="confirmBtn" onclick="confirmAnswer()" disabled>
        ✓ 确认答案
      </button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none;">
        下一题 →
      </button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="screen-result" class="screen">
    <div class="results-hero">
      <div class="score-circle" id="scoreCircle">
        <div>
          <div class="score-value" id="scoreValue">0</div>
          <div class="score-label">分</div>
        </div>
      </div>
      <div class="results-grade">评价：<span id="gradeText">—</span></div>
      <div class="results-sub" id="resultSubtitle"></div>
    </div>

    <div class="results-stats">
      <div class="result-stat correct-stat">
        <div class="icon">✅</div>
        <div class="val" id="statCorrect">0</div>
        <div class="label">答对</div>
      </div>
      <div class="result-stat wrong-stat">
        <div class="icon">❌</div>
        <div class="val" id="statWrong">0</div>
        <div class="label">答错</div>
      </div>
      <div class="result-stat skipped-stat">
        <div class="icon">⏭</div>
        <div class="val" id="statSkipped">0</div>
        <div class="label">跳过</div>
      </div>
      <div class="result-stat time-stat">
        <div class="icon">⏱</div>
        <div class="val" id="statTime">00:00</div>
        <div class="label">用时</div>
      </div>
    </div>

    <!-- Type breakdown -->
    <div id="typeBreakdown" style="margin-bottom:20px;"></div>

    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-primary btn-block" onclick="restartLastQuiz()">
        <span class="icon">🔄</span> 再练一次
      </button>
      <button class="btn btn-secondary btn-block" onclick="navigate('wrong')">
        <span class="icon">📚</span> 查看本次错题
      </button>
      <button class="btn btn-ghost btn-block" onclick="navigate('home')">
        <span class="icon">🏠</span> 返回首页
      </button>
    </div>
  </div>

  <!-- History Screen -->
  <div id="screen-history" class="screen">
    <div class="screen-header">
      <div class="screen-title">📋 答题历史</div>
      <button class="back-btn" onclick="navigate('home')">← 返回</button>
    </div>
    <div class="history-filters" id="historyFilters">
      <button class="filter-chip active" onclick="filterHistory('all', this)">全部</button>
      <button class="filter-chip" onclick="filterHistory('all', this)">综合</button>
      <button class="filter-chip" onclick="filterHistory('single', this)">单选题</button>
      <button class="filter-chip" onclick="filterHistory('multi', this)">多选题</button>
      <button class="filter-chip" onclick="filterHistory('judge', this)">判断题</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Wrong Questions Screen -->
  <div id="screen-wrong" class="screen">
    <div class="screen-header">
      <div class="screen-title">📚 错题本</div>
      <button class="back-btn" onclick="navigate('home')">← 返回</button>
    </div>
    <div class="wrong-tabs">
      <button class="tab-chip active" onclick="filterWrong('all', this)">全部</button>
      <button class="tab-chip" onclick="filterWrong('single', this)">单选题</button>
      <button class="tab-chip" onclick="filterWrong('multi', this)">多选题</button>
      <button class="tab-chip" onclick="filterWrong('judge', this)">判断题</button>
    </div>
    <button class="btn btn-primary btn-block" style="margin:12px 16px 4px;" onclick="startWrongPractice()">
      <span class="icon">🔁</span> 重新练习错题（<span id="wrongCount">${state.wrongQuestions.length}</span>题）
    </button>
    <div id="wrongList"></div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="quiz_data.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = {
  currentScreen: 'home',
  quizMode: null,          // 'all' | 'single' | 'multi' | 'judge' | 'custom' | 'sequential'
  selectedTypes: [],        // for custom mode
  questions: [],            // current quiz questions
  currentIndex: 0,
  answers: [],              // {qId, userAnswer, correct, isCorrect}
  sessionStart: null,
  sessionId: null,
  timerInterval: null,
  elapsedSeconds: 0,
  userAnswer: null,         // current question user selection
  confirmed: false,
  selectedOptions: new Set(),
  history: [],
  wrongQuestions: [],      // all-time wrong
  quizSessionWrong: [],     // current session wrong
  seqProgress: null         // {currentIndex, answers, elapsedSeconds, quizSessionWrong} — 顺序练习断点续传
};

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function init() {
  loadState();
  updateHeaderStats();
  renderHome();
}

// ═══════════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════════
function saveState() {
  localStorage.setItem('dfqc_quiz_state', JSON.stringify({
    history: state.history,
    wrongQuestions: state.wrongQuestions,
    seqProgress: state.seqProgress
  }));
}
function loadState() {
  try {
    const saved = localStorage.getItem('dfqc_quiz_state');
    if (saved) {
      const data = JSON.parse(saved);
      state.history = data.history || [];
      state.wrongQuestions = data.wrongQuestions || [];
      state.seqProgress = data.seqProgress || null;
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function navigate(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  state.currentScreen = screen;
  if (screen === 'home') renderHome();
  if (screen === 'history') renderHistory();
  if (screen === 'wrong') {
    document.getElementById('wrongCount').textContent = state.wrongQuestions.length;
    renderWrong();
  }
}

// ═══════════════════════════════════════════════════════
//  HOME RENDER
// ═══════════════════════════════════════════════════════
function renderHome() {
  loadState();
  document.getElementById('homeSessions').textContent = state.history.length;
  document.getElementById('homeWrong').textContent = state.wrongQuestions.length;
  const sessions = state.history;
  if (sessions.length > 0) {
    const avgRate = sessions.reduce((a, s) => a + s.score/s.total*100, 0) / sessions.length;
    document.getElementById('homeCorrect').textContent = avgRate.toFixed(0) + '%';
  }
  // 顺序练习断点续传提示
  const resumeBanner = document.getElementById('seqResumeBanner');
  if (state.seqProgress && state.seqProgress.currentIndex >= 0 && state.seqProgress.currentIndex < QUESTION_BANK.length) {
    resumeBanner.style.display = '';
    document.getElementById('seqResumeNum').textContent = state.seqProgress.currentIndex + 1;
  } else {
    resumeBanner.style.display = 'none';
  }
  renderRecentHistory();
}

function renderRecentWrongList() {
  const container = document.getElementById('recentWrongList');
  if (state.wrongQuestions.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>太棒了！暂无错题</p><p style="font-size:12px;margin-top:4px;">继续保持！</p></div>';
    return;
  }
  const recent = state.wrongQuestions.slice(-5).reverse();
  const typeNames = {'single':'单选题','multi':'多选题','judge':'判断题'};
  container.innerHTML = recent.map(q => `
    <div class="history-item" onclick="navigate('wrong')">
      <div class="history-icon mixed-mode" style="background:var(--red-dim);">❌</div>
      <div class="history-info">
        <div class="history-title">${q.question.replace(/<[^>]+>/g,'').substring(0,40)}...</div>
        <div class="history-meta">
          <span>${typeNames[q.type]||q.type}</span>
          <span>正确答案是 ${q.type==='judge'?(q.answer==='T'?'对':'错'):q.answer}</span>
        </div>
      </div>
      <div class="history-score">
        <div class="pct" style="color:var(--red);">❌</div>
      </div>
    </div>`).join('');
}

function renderRecentHistory() {
  const container = document.getElementById('recentHistory');
  const recent = state.history.slice(-3).reverse();
  if (recent.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无答题记录</p></div>';
    return;
  }
  container.innerHTML = recent.map(h => buildHistoryItem(h)).join('');
}

function buildHistoryItem(h) {
  const modeLabel = {all:'综合模式',single:'单选题',multi:'多选题',judge:'判断题',custom:'专项答题'};
  const iconClass = {all:'mixed-mode',single:'single-mode',multi:'multi-mode',judge:'judge-mode',custom:'mixed-mode',sequential:'mixed-mode'};
  const pct = h.total > 0 ? (h.score/h.total*100).toFixed(0) : 0;
  const date = new Date(h.date).toLocaleDateString('zh-CN', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const incompleteTag = h.incomplete ? '<span style="background:var(--yellow-dim);color:var(--yellow);border:1px solid var(--yellow);border-radius:8px;padding:1px 6px;font-size:10px;margin-left:4px;">未完成</span>' : '';
  const modeIcon = h.mode==='all'?'🎯':h.mode==='single'?'1':h.mode==='multi'?'☑':h.mode==='judge'?'✓':h.mode==='sequential'?'📖':'🎯';
  return `<div class="history-item" onclick="viewHistoryDetail(${h.id})">
    <div class="history-icon ${iconClass[h.mode]||'mixed-mode'}">${modeIcon}</div>
    <div class="history-info">
      <div class="history-title">${modeLabel[h.mode]||'综合练习'}${incompleteTag}</div>
      <div class="history-meta">
        <span>📅 ${date}</span>
        <span>⏱ ${h.duration}</span>
        <span>✅ ${h.score}/${h.total}</span>
      </div>
    </div>
    <div class="history-score">
      <div class="pct">${pct}%</div>
      <div class="pts">${h.score}分</div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  MODE SELECTOR
// ═══════════════════════════════════════════════════════
function showModeSelector() {
  const el = document.getElementById('modeSelector');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
  state.selectedTypes = [];
  document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('customQuizBtn').disabled = true;
}
function toggleTypeChip(el, type) {
  el.classList.toggle('selected');
  if (state.selectedTypes.includes(type)) {
    state.selectedTypes = state.selectedTypes.filter(t => t !== type);
  } else {
    state.selectedTypes.push(type);
  }
  document.getElementById('customQuizBtn').disabled = state.selectedTypes.length === 0;
}
function startCustomQuiz() {
  if (state.selectedTypes.length === 0) return;
  state.quizMode = 'custom';
  state.selectedTypes = [...state.selectedTypes];
  const pool = QUESTION_BANK.filter(q => state.selectedTypes.includes(q.type));
  state.questions = shuffle(pool);
  // Limit to max 100 per type if all selected
  if (state.questions.length > 500) state.questions = state.questions.slice(0, 500);
  startQuiz();
}

// ═══════════════════════════════════════════════════════
//  QUIZ START
// ═══════════════════════════════════════════════════════
function startQuickQuiz(mode) {
  state.quizMode = mode; // 'all'
  if (mode === 'all') {
    state.questions = shuffle([...QUESTION_BANK]);
  }
  startQuiz();
}

// ── 顺序练习（按题号顺序，支持断点续传）──
function startSequentialQuiz() {
  state.quizMode = 'sequential';
  state.questions = [...QUESTION_BANK]; // 不打乱，保持原始顺序
  state.seqProgress = null; // 清除断点，从头开始
  saveState();
  startQuiz();
}

function resumeSequentialQuiz() {
  if (!state.seqProgress) return;
  state.quizMode = 'sequential';
  state.questions = [...QUESTION_BANK]; // 保持原始顺序
  state.currentIndex = state.seqProgress.currentIndex || 0;
  state.answers = state.seqProgress.answers || [];
  state.quizSessionWrong = state.seqProgress.quizSessionWrong || [];
  state.sessionStart = Date.now();
  state.sessionId = Date.now();
  state.elapsedSeconds = state.seqProgress.elapsedSeconds || 0;
  navigate('quiz');
  renderQuestion();
  startTimer();
}

function startQuiz() {
  state.sessionId = Date.now();
  // 顺序练习且有断点：从断点续传；否则全部重置
  if (state.quizMode === 'sequential' && state.seqProgress) {
    state.currentIndex = state.seqProgress.currentIndex || 0;
    state.answers = state.seqProgress.answers || [];
    state.quizSessionWrong = state.seqProgress.quizSessionWrong || [];
    state.elapsedSeconds = state.seqProgress.elapsedSeconds || 0;
  } else {
    state.currentIndex = 0;
    state.answers = [];
    state.quizSessionWrong = [];
    state.elapsedSeconds = 0;
  }
  navigate('quiz');
  renderQuestion();
  startTimer();
}

function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.elapsedSeconds++;
    updateTimerDisplay();
  }, 1000);
}
function updateTimerDisplay() {
  const s = state.elapsedSeconds;
  const m = Math.floor(s / 60);
  const ss = s % 60;
  const display = `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  document.getElementById('timerDisplay').textContent = display;
  const timerEl = document.getElementById('quizTimer');
  timerEl.classList.remove('warning','danger');
  if (s >= 3600) timerEl.classList.add('danger');
  else if (s >= 1800) timerEl.classList.add('warning');
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = s % 60;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════════════════
function renderQuestion() {
  const q = state.questions[state.currentIndex];
  if (!q) { showResult(); return; }

  state.userAnswer = null;
  state.confirmed = false;
  state.selectedOptions = new Set();

  // Progress
  const idx = state.currentIndex;
  const total = state.questions.length;
  document.getElementById('curQNum').textContent = idx + 1;
  document.getElementById('totalQNum').textContent = total;
  document.getElementById('progressFill').style.width = ((idx+1)/total*100) + '%';

  // Type badge
  const typeMap = {single:'单选题', multi:'多选题', judge:'判断题'};
  const typeIcon = {single:'1', multi:'☑', judge:'✓'};
  const badge = document.getElementById('quizTypeBadge');
  badge.className = `quiz-type-badge ${q.type}`;
  document.getElementById('quizTypeText').textContent = typeMap[q.type] || q.type;
  document.getElementById('quizTypeIcon').textContent = typeIcon[q.type] || '●';

  // Question text
  document.getElementById('questionText').textContent = `${q.num}. ${q.question.replace(/（　）/g,'___')}`;

  // Options — 判断题无选项时自动生成「对/错」按钮
  const isMulti = q.type === 'multi';
  const opts = document.getElementById('optionsList');
  let options = q.options;
  if (q.type === 'judge' && (!options || options.length === 0)) {
    options = [
      { key: 'T', text: '对' },
      { key: 'F', text: '错' }
    ];
  }
  opts.innerHTML = options.map(o => `
    <div class="option-item ${isMulti ? 'multi-select-mode' : ''}"
         data-key="${o.key}" onclick="toggleOption('${o.key}')">
      <div class="option-key">${o.key === 'T' ? '✓' : o.key === 'F' ? '✗' : o.key}</div>
      <div class="option-text">${o.text}</div>
      <div class="option-check">${isMulti ? '☑' : '✓'}</div>
    </div>`).join('');

  // Result banner hidden
  document.getElementById('resultBanner').style.display = 'none';
  document.getElementById('answerExplanation').classList.remove('show');

  // Buttons
  document.getElementById('confirmBtn').style.display = '';
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = '';
}

// ═══════════════════════════════════════════════════════
//  OPTION SELECTION
// ═══════════════════════════════════════════════════════
function toggleOption(key) {
  if (state.confirmed) return;
  const q = state.questions[state.currentIndex];
  
  if (q.type === 'single' || q.type === 'judge') {
    // 单选：清除所有选中，选中当前
    state.selectedOptions.clear();
    state.selectedOptions.add(key);
    renderOptionHighlights(q);
  } else {
    // 多选：toggle
    if (state.selectedOptions.has(key)) {
      state.selectedOptions.delete(key);
    } else {
      state.selectedOptions.add(key);
    }
    renderOptionHighlights(q);
  }
  
  // Enable confirm if something selected
  document.getElementById('confirmBtn').disabled = state.selectedOptions.size === 0;
}

function renderOptionHighlights(q) {
  const items = document.querySelectorAll('.option-item');
  items.forEach(item => {
    const key = item.dataset.key;
    item.classList.remove('selected');
    if (state.selectedOptions.has(key)) {
      item.classList.add('selected');
    }
  });
}

// ═══════════════════════════════════════════════════════
//  CONFIRM & NEXT
// ═══════════════════════════════════════════════════════
function confirmAnswer() {
  if (state.confirmed) return;
  state.confirmed = true;
  const q = state.questions[state.currentIndex];
  
  // Build user answer string
  let userAns;
  if (q.type === 'single' || q.type === 'judge') {
    userAns = [...state.selectedOptions][0] || '';
  } else {
    userAns = [...state.selectedOptions].sort().join('');
  }
  state.userAnswer = userAns;

  // Determine correctness
  let correctAns = q.answer || '';
  let isCorrect;
  
  if (q.type === 'single') {
    isCorrect = userAns === correctAns;
  } else if (q.type === 'multi') {
    // 多选：全部选对才算对
    isCorrect = userAns === correctAns;
  } else {
    // 判断题: F=错 T=对
    isCorrect = (userAns === correctAns);
  }

  // Record
  state.answers.push({
    qId: q.id,
    num: q.num,
    type: q.type,
    question: q.question,
    options: q.options,
    userAnswer: userAns,
    correctAnswer: correctAns,
    isCorrect
  });

  // Wrong tracking
  if (!isCorrect) {
    state.quizSessionWrong.push(q);
    // Add to all-time wrong (avoid duplicates by qId)
    const exists = state.wrongQuestions.some(w => w.id === q.id);
    if (!exists) {
      state.wrongQuestions.push({...q});
    }
  }

  // Show correct/wrong highlights
  const items = document.querySelectorAll('.option-item');
  items.forEach(item => {
    const key = item.dataset.key;
    item.classList.add('disabled');
    if (q.type === 'single' || q.type === 'judge') {
      if (key === correctAns) item.classList.add('correct');
      if (key === userAns && userAns !== correctAns) item.classList.add('wrong');
    } else {
      // 多选
      if (correctAns.includes(key)) item.classList.add('correct');
      if (userAns.includes(key) && !correctAns.includes(key)) item.classList.add('wrong');
    }
  });

  // Result banner
  const banner = document.getElementById('resultBanner');
  banner.style.display = 'flex';
  if (isCorrect) {
    banner.className = 'result-banner correct';
    document.getElementById('resultIcon').textContent = '✅';
    document.getElementById('resultTitle').textContent = '回答正确！';
    document.getElementById('resultAnswer').textContent = '';
  } else {
    banner.className = 'result-banner wrong';
    document.getElementById('resultIcon').textContent = '❌';
    const correctText = q.type === 'judge' 
      ? (correctAns === 'T' ? '正确答案：对' : '正确答案：错')
      : `正确答案：${correctAns}`;
    document.getElementById('resultTitle').textContent = '回答错误';
    document.getElementById('resultAnswer').textContent = correctText;
  }

  // Buttons
  document.getElementById('confirmBtn').style.display = 'none';
  const isLast = state.currentIndex >= state.questions.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? '📊 查看成绩' : '下一题 →';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('skipBtn').style.display = 'none';
}

function skipQuestion() {
  if (state.confirmed) { nextQuestion(); return; }
  const q = state.questions[state.currentIndex];
  
  state.answers.push({
    qId: q.id,
    num: q.num,
    type: q.type,
    question: q.question,
    options: q.options,
    userAnswer: '⏭跳过',
    correctAnswer: q.answer,
    isCorrect: null,
    skipped: true
  });

  const banner = document.getElementById('resultBanner');
  banner.style.display = 'flex';
  banner.className = 'result-banner skipped';
  document.getElementById('resultIcon').textContent = '⏭';
  document.getElementById('resultTitle').textContent = '已跳过此题';
  const correctText = q.type === 'judge'
    ? (q.answer === 'T' ? '正确答案：对' : '正确答案：错')
    : `正确答案：${q.answer}`;
  document.getElementById('resultAnswer').textContent = correctText;

  // Highlight correct answers
  const items = document.querySelectorAll('.option-item');
  items.forEach(item => {
    const key = item.dataset.key;
    item.classList.add('disabled');
    if (q.type === 'judge') {
      if (key === q.answer) item.classList.add('correct');
    } else {
      if (q.answer && q.answer.includes(key)) item.classList.add('correct');
    }
  });

  document.getElementById('confirmBtn').style.display = 'none';
  const isLast = state.currentIndex >= state.questions.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? '📊 查看成绩' : '下一题 →';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('skipBtn').style.display = 'none';
  state.confirmed = true;
}

function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
    // Scroll to top
    document.getElementById('screen-quiz').scrollIntoView({behavior:'smooth', block:'start'});
  }
}

// ═══════════════════════════════════════════════════════
//  SHOW RESULT
// ═══════════════════════════════════════════════════════
function showResult() {
  clearInterval(state.timerInterval);
  
  // 顺序练习完成后清除断点
  if (state.quizMode === 'sequential') {
    state.seqProgress = null;
    saveState();
  }
  
  const correct = state.answers.filter(a => a.isCorrect === true).length;
  const wrong = state.answers.filter(a => a.isCorrect === false).length;
  const skipped = state.answers.filter(a => a.skipped).length;
  const total = state.answers.length;
  const score = correct;
  const pct = total > 0 ? (correct/total*100) : 0;

  // Determine grade
  let grade = '';
  if (pct >= 90) grade = '卓越';
  else if (pct >= 80) grade = '优秀';
  else if (pct >= 70) grade = '良好';
  else if (pct >= 60) grade = '及格';
  else grade = '继续努力';

  // Score circle animation
  const deg = pct * 3.6;
  document.getElementById('scoreCircle').style.setProperty('--score-deg', deg + 'deg');
  document.getElementById('scoreValue').textContent = score;
  document.getElementById('gradeText').textContent = grade;
  document.getElementById('resultSubtitle').textContent = 
    `本次练习正确率 ${pct.toFixed(1)}% (${correct}/${total}) · 用时 ${formatTime(state.elapsedSeconds)}`;

  // Stats
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statSkipped').textContent = skipped;
  document.getElementById('statTime').textContent = formatTime(state.elapsedSeconds);

  // Type breakdown
  const types = ['single','multi','judge'];
  const typeNames = {'single':'单选题','multi':'多选题','judge':'判断题'};
  let breakdown = '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">';
  types.forEach(t => {
    const typeAnswers = state.answers.filter(a => a.type === t);
    if (typeAnswers.length === 0) return;
    const tc = typeAnswers.filter(a => a.isCorrect === true).length;
    const tp = (tc/typeAnswers.length*100).toFixed(0);
    breakdown += `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;">
      <div style="width:70px;font-size:12px;color:var(--text-secondary)">${typeNames[t]}</div>
      <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${tp}%;background:${tp>=70?'var(--green)':'var(--yellow)'};border-radius:3px;"></div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-secondary);width:50px;text-align:right;">${tc}/${typeAnswers.length}</div>
    </div>`;
  });
  breakdown += '</div>';
  document.getElementById('typeBreakdown').innerHTML = breakdown;

  // Save history
  const session = {
    id: state.sessionId,
    mode: state.quizMode,
    type: state.selectedTypes && state.selectedTypes.length > 0 ? 'custom' : state.quizMode,
    total, correct, wrong, skipped, score: correct,
    duration: formatTime(state.elapsedSeconds),
    date: new Date().toISOString(),
    answers: state.answers,
    wrongQIds: state.quizSessionWrong.map(q => q.id)
  };
  state.history.push(session);
  saveState();
  updateHeaderStats();

  navigate('result');
}

function restartLastQuiz() {
  // Restart with same settings
  if (state.quizMode === 'sequential') {
    startSequentialQuiz();
  } else if (state.quizMode === 'all') {
    startQuickQuiz('all');
  } else if (state.quizMode === 'custom') {
    startCustomQuiz();
  } else {
    startQuickQuiz(state.quizMode);
  }
}

// ═══════════════════════════════════════════════════════
//  EXIT QUIZ (save partial progress)
// ═══════════════════════════════════════════════════════
function exitQuiz() {
  clearInterval(state.timerInterval);
  try {
    // 保存已答题目和错题（即使未完成）
    if (state.answers.length > 0) {
      // 把本次错题合并到全局错题本（去重）
      state.quizSessionWrong.forEach(q => {
        if (!state.wrongQuestions.some(w => w.id === q.id)) {
          state.wrongQuestions.push(q);
        }
      });
      const answeredCount = state.answers.filter(a => !a.skipped).length;
      const correctCount = state.answers.filter(a => a.isCorrect === true).length;
      
      // 顺序练习：保存断点进度
      if (state.quizMode === 'sequential') {
        state.seqProgress = {
          currentIndex: state.currentIndex,
          answers: state.answers,
          elapsedSeconds: state.elapsedSeconds,
          quizSessionWrong: state.quizSessionWrong
        };
      }
      
      const session = {
        id: state.sessionId,
        mode: state.quizMode,
        type: (state.selectedTypes && state.selectedTypes.length > 0) ? 'custom' : state.quizMode,
        total: state.answers.length,
        correct: correctCount,
        wrong: answeredCount - correctCount,
        skipped: state.answers.filter(a => a.skipped).length,
        score: correctCount,
        duration: formatTime(state.elapsedSeconds),
        date: new Date().toISOString(),
        answers: state.answers,
        wrongQIds: state.quizSessionWrong.map(q => q.id),
        incomplete: true
      };
      // 如果同 sessionId 已存在则更新，否则添加
      const existIdx = state.history.findIndex(h => h.id === state.sessionId);
      if (existIdx >= 0) {
        state.history[existIdx] = session;
      } else {
        state.history.push(session);
      }
      saveState();
      updateHeaderStats();
      showToast(`已保存本次练习（${answeredCount}题${state.quizMode==='sequential'?'，下次可继续':''}）`);
    }
    navigate('home');
  } catch(e) {
    alert('退出出错：' + e.message);
    console.error('exitQuiz error:', e);
  }
}

// ═══════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════
let currentHistoryFilter = 'all';
function renderHistory() {
  loadState();
  const filtered = currentHistoryFilter === 'all' 
    ? state.history 
    : state.history.filter(h => h.mode === currentHistoryFilter);
  const container = document.getElementById('historyList');

  // Update filter chip counts (reset text each time to avoid drift)
  const chips = document.querySelectorAll('#historyFilters .filter-chip');
  const labels = ['全部', '综合', '单选题', '多选题', '判断题'];
  chips.forEach((c, i) => {
    if (labels[i]) c.textContent = labels[i];
    const mode2 = c.textContent.trim();
    const allModes = ['全部', '综合'];
    const m = allModes.includes(mode2) ? 'all' : (mode2 === '单选题' ? 'single' : mode2 === '多选题' ? 'multi' : mode2 === '判断题' ? 'judge' : 'all');
    const cnt = m === 'all' ? state.history.length : state.history.filter(h => h.mode === m).length;
    if (mode2 !== '全部') c.textContent = mode2 + (cnt > 0 ? ` (${cnt})` : '');
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>暂无答题记录</p></div>';
    return;
  }
  container.innerHTML = filtered.slice().reverse().map(h => buildHistoryItem(h)).join('');
}

function filterHistory(mode, el) {
  // '全部'/'综合'/'all' 统一映射到 'all'
  const allModes = ['全部', '综合', 'all'];
  currentHistoryFilter = allModes.includes(mode) ? 'all' : mode;
  document.querySelectorAll('#historyFilters .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderHistory();
}

function viewHistoryDetail(sessionId) {
  const session = state.history.find(h => h.id === sessionId);
  if (!session) return;
  // Just show result screen with data
  const correct = session.correct;
  const total = session.total;
  const pct = (correct/total*100);
  const deg = pct * 3.6;
  document.getElementById('scoreCircle').style.setProperty('--score-deg', deg + 'deg');
  document.getElementById('scoreValue').textContent = correct;
  let grade = '';
  if (pct >= 90) grade = '卓越';
  else if (pct >= 80) grade = '优秀';
  else if (pct >= 70) grade = '良好';
  else if (pct >= 60) grade = '及格';
  else grade = '继续努力';
  document.getElementById('gradeText').textContent = grade;
  const modeLabel = {all:'综合模式',single:'单选题',multi:'多选题',judge:'判断题',custom:'专项答题',sequential:'顺序练习'};
  document.getElementById('resultSubtitle').textContent = 
    `${modeLabel[session.mode]||'练习'} · 正确率 ${pct.toFixed(1)}% (${correct}/${total}) · 用时 ${session.duration}`;
  document.getElementById('statCorrect').textContent = session.correct;
  document.getElementById('statWrong').textContent = session.wrong;
  document.getElementById('statSkipped').textContent = session.skipped;
  document.getElementById('statTime').textContent = session.duration;
  document.getElementById('typeBreakdown').innerHTML = '';
  // Mark as viewed session
  state.sessionId = session.id;
  state.quizMode = session.mode;
  state.quizSessionWrong = (session.wrongQIds || []).map(id => QUESTION_BANK.find(q => q.id === id)).filter(Boolean);
  navigate('result');
}

// ═══════════════════════════════════════════════════════
//  WRONG QUESTIONS
// ═══════════════════════════════════════════════════════
let currentWrongFilter = 'all';
function renderWrong() {
  loadState();
  const filtered = currentWrongFilter === 'all'
    ? state.wrongQuestions
    : state.wrongQuestions.filter(q => q.type === currentWrongFilter);
  const container = document.getElementById('wrongList');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>太棒了！暂无错题记录</p><p style="font-size:12px;margin-top:4px;">继续保持！</p></div>';
    return;
  }

  const typeNames = {'single':'单选题','multi':'多选题','judge':'判断题'};
  container.innerHTML = filtered.map(q => {
    const opts = q.type === 'judge'
      ? [
          {key:'T', text:'对'},
          {key:'F', text:'错'}
        ]
      : (q.options || []);
    return `
    <div class="question-card">
      <div class="q-meta">
        <span class="quiz-type-badge ${q.type}" style="margin:0;font-size:10px;">
          ${typeNames[q.type]||q.type}
        </span>
        <span class="q-num">#${q.num}</span>
      </div>
      <div class="q-text">${q.question.replace(/（　）/g,'___')}</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">
        ${opts.map(o => `
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;background:var(--bg-dark);border-radius:6px;color:var(--text-secondary);">
            <span style="font-weight:700;font-family:'JetBrains Mono',monospace;opacity:0.6;">${o.key === 'T' ? '✓' : o.key === 'F' ? '✗' : o.key}.</span>
            <span>${o.text}</span>
          </div>`).join('')}
      </div>
      <div class="correct-answer">
        ✅ 正确答案：${q.type === 'judge' ? (q.answer === 'T' ? '对' : '错') : q.answer}
      </div>
    </div>`;
  }).join('');
}

// Start a quiz with wrong questions only
function startWrongPractice() {
  if (state.wrongQuestions.length === 0) {
    showToast('错题本为空，先去练习吧！');
    return;
  }
  state.quizMode = 'wrong';
  state.questions = [...state.wrongQuestions];
  state.currentIndex = 0;
  state.answers = [];
  state.quizSessionWrong = [];
  // 注意：seqProgress 不清，保留顺序练习断点，用户可以随时回去继续
  state.userAnswer = null;
  state.confirmed = false;
  state.selectedOptions = new Set();
  state.sessionStart = Date.now();
  state.sessionId = 'wrong_' + Date.now();
  state.elapsedSeconds = 0;
  clearInterval(state.timerInterval);
  navigate('quiz');
  renderQuestion();
  startTimer();
}

function filterWrong(type, el) {
  currentWrongFilter = type;
  document.querySelectorAll('.wrong-tabs .tab-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderWrong();
}

// ═══════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateHeaderStats() {
  document.getElementById('totalSessions').textContent = state.history.length;
  document.getElementById('totalWrong').textContent = state.wrongQuestions.length;
  document.getElementById('homeSessions').textContent = state.history.length;
  const homeWrongEl = document.getElementById('homeWrong');
  if (homeWrongEl) homeWrongEl.textContent = state.wrongQuestions.length;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════
//  GO!
// ═══════════════════════════════════════════════════════
init();
</script>
